services :
    catalogue:
        build: ./catalogue
        image: pavithrakasukurthi/catalogue:v1
        container_name: catalogue
        depends_on:
            - mongodb
    mongodb:
        build: ./mongodb
        image: pavithrakasukurthi/mongodb:v1
        container_name: mongodb
        volumes:
            - mongodb:/data/db
    mysql:
        build: ./mysql
        image: pavithrakasukurthi/mysql:v1
        container_name: mysql
        volumes:
            - mysql:/var/lib/mysql
    redis:
        image: redis:7
        container_name: redis
        volumes:
            - redis:/data
    rabbitmq:
        image: rabbitmq:3
        container_name: rabbitmq
        volumes:
            - rabbitmq:/var/lib/rabbitmq
        environment:
            RABBITMQ_DEFAULT_USER: roboshop
            RABBITMQ_DEFAULT_PASS: roboshop123
    user:
        build: ./user
        image: pavithrakasukurthi/user:v1
        container_name: user
        depends_on:
            - redis
            - mongodb
    cart:
        build: ./cart
        image: pavithrakasukurthi/cart:v1
        container_name: cart
        depends_on:
            - catalogue
            - redis
    shipping:
        build: ./shipping
        image: pavithrakasukurthi/shipping:v1
        container_name: shipping
        depends_on:
            - mysql
            - cart
    payment:
        build: ./payment
        image: pavithrakasukurthi/payment:v1
        container_name: payment
        depends_on: 
            - rabbitmq
            - cart
            - user
    frontend:
        build: ./frontend
        image: pavithrakasukurthi/frontend:v1
        container_name: frontend
        ports:
            - "80:80"
        depends_on:
            - catalogue
            - cart
            - user
            - payment
            - shipping
networks:
    default:
        driver: bridge
        name: roboshop
        external: false # true if you have already created network manually using docker network command
volumes:
    mongodb: #docker volume create mongodb. /var/lib/docker/volumes
    redis:
    mysql:
    rabbitmq:

            - 